---
# Test workload — verifies the cluster can schedule pods across workers
# and that the CNI (Calico) is routing pod-to-pod traffic correctly.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  labels:
    app: nginx-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-demo
  template:
    metadata:
      labels:
        app: nginx-demo
    spec:
      # Spread pods across different nodes to verify multi-node scheduling
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        nodeTaintsPolicy: Honor   # exclude tainted nodes (control-plane) from domain count
        labelSelector:
          matchLabels:
            app: nginx-demo
      containers:
      - name: nginx
        image: nginx:1.27.0
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-demo
spec:
  selector:
    app: nginx-demo
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
